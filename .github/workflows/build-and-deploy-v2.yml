name: Build and Deploy

"on":
  workflow_call:
    inputs:
      api_name:
        required: true
        type: string
      dockerfile_path:
        required: false
        type: string
        default: "Dockerfile.lambda"
      sam_template_path:
        required: false
        type: string
        default: "../infrastructure/template.yaml"
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      deployments: write
    outputs:
      image-uri: ${{ steps.meta.outputs.image-uri }}
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version
        id: version
        run: |
          VERSION="v$(date +'%Y%m%d.%H%M%S')"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest

      - name: Set outputs
        id: meta
        run: |
          IMAGE_URI="${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}"
          echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "image-tag=${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
