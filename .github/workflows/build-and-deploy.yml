name: Build and Deploy

on:
  workflow_call:
    inputs:
      api_name:
        required: true
        type: string
        description: "API name (e.g., entitlement-api)"
      dockerfile_path:
        required: false
        type: string
        default: "Dockerfile.lambda"
        description: "Path to Dockerfile"
      sam_template_path:
        required: false
        type: string
        default: "../infrastructure/template.yaml"
        description: "Path to SAM template.yaml"
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      deployments: write
    outputs:
      image-uri: ${{ steps.meta.outputs.image-uri }}
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version tag
        id: version
        run: |
          VERSION="v$(date +'%Y%m%d.%H%M%S')"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image URI metadata
        id: meta
        run: |
          IMAGE_URI="${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}"
          echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "image-tag=${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "🐳 Image URI: ${IMAGE_URI}"

  create-tag:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.build-and-push.outputs.image-tag }}"
          git push origin "${{ needs.build-and-push.outputs.image-tag }}"
          echo "🏷️ Tag created: ${{ needs.build-and-push.outputs.image-tag }}"

  deploy-staging:
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      contents: read
    environment:
      name: staging
      url: https://staging-api.korz.sh
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment
        uses: actions/github-script@v7
        id: create-deployment
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'staging',
              description: 'Deploy ${{ inputs.api_name }} to staging',
              required_contexts: [],
              auto_merge: false,
              production_environment: false
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Deploy with SAM
        run: |
          cd infrastructure
          sam deploy \
            --config-env staging \
            --no-confirm-changeset \
            --parameter-overrides \
              ImageUri=${{ needs.build-and-push.outputs.image-uri }}

      - name: Mark deployment as successful
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'success',
              description: 'Deployment successful',
              environment_url: 'https://staging-api.korz.sh'
            });

      - name: Mark deployment as failed
        uses: actions/github-script@v7
        if: failure()
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Deployment failed'
            });
